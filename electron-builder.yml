appId: com.clawdforge.dashboard
productName: Claw'd Forge
directories:
  output: dist
files:
  - main.js
  - launch.js
  - preload.js
  - src/bridge/**/*
  - dist-renderer/**/*
  - node_modules/**/*
  - "!node_modules/**/*.md"
  - "!node_modules/**/*.map"
  - "!node_modules/**/test/**"
  - "!node_modules/**/tests/**"
  - "!node_modules/**/__tests__/**"
win:
  target: dir
  signAndEditExecutable: false
npmRebuild: false
asar: true
asarUnpack:
  - node_modules/node-pty/**/*
